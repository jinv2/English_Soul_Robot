        function checkInstinct(word) {
            const cleanWord = word.trim().toLowerCase();
            return InstinctBrain[cleanWord] || null;
        }

        // 1. Audio Setup with safety
        const BASE64_IGNITE = 'data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAgD8AAIA/AAABAAgAZGF0YTdvT18fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8';
        const BASE64_THINKING = 'data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAgD8AAIA/AAABAAgAZGF0YTdvT19PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09PT09';
        const BASE64_SUCCESS = 'data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAgD8AAIA/AAABAAgAZGF0YTdvT18fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8';

        let sounds = {};
        try {
            sounds = {
                ignite: new Audio(BASE64_IGNITE),
                thinking: new Audio(BASE64_THINKING),
                success: new Audio(BASE64_SUCCESS)
            };
        } catch(e) { console.warn("Audio initialization failed:", e); }

        function playThinking() {
            try { if (sounds.thinking) { sounds.thinking.loop = true; sounds.thinking.play().catch(() => {}); } } catch(e) {}
        }
        function stopThinking() {
            try { if (sounds.thinking) { sounds.thinking.pause(); sounds.thinking.currentTime = 0; } } catch(e) {}
        }

        // 2. DOM Elements
        const connectBtn = document.getElementById('connect-btn');
        const userInput = document.getElementById('input-word');
        const outputArea = document.querySelector('.output-area');
        const speechBubble = document.querySelector('.hand-drawn-bubble');
        const signalLight = document.getElementById('signal-light');
        const eyes = [document.getElementById('eye-left'), document.getElementById('eye-right')];

        const robotSoul = new SoulEngine({ useWebGPU: true, precision: 'q4' });

        // Background initialization
        try { robotSoul.ignite(); } catch(e) {}

        window.addEventListener('soul-ready', (e) => {
            try {
                const { mode } = e.detail;
                if (signalLight) signalLight.className = mode === 'webgpu' ? 'status-green' : 'status-yellow';
                eyes.forEach(eye => { if (eye) eye.style.opacity = "1"; });
            } catch(err) {}
        });

        // 3. Interaction Logic
        connectBtn.addEventListener('click', async () => {
            try {
                const word = userInput.value ? userInput.value.trim() : "";
                if (!word) return;

                // ⚡ Instant Feedback
                if (sounds.ignite) sounds.ignite.play().catch(() => {});
                eyes.forEach(eye => { if (eye) eye.classList.add('eye-glow'); });

                // 🧠 Step 1: Instinct Brain
                const instinctResult = checkInstinct(word);
                if (instinctResult) {
                    if (outputArea) outputArea.innerHTML = instinctResult;
                    if (speechBubble) speechBubble.innerText = "Instinct protocol active!";
                    if (sounds.success) sounds.success.play().catch(() => {});
                    setTimeout(() => eyes.forEach(eye => { if (eye) eye.classList.remove('eye-glow'); }), 1000);
                    return;
                }

                // 🧬 Step 2: Full Brain
                const originalText = connectBtn.innerText;
                connectBtn.innerText = "召唤中..."; 
                if (outputArea) outputArea.innerHTML = "Connecting to the robot's soul matrix...";
                connectBtn.disabled = true;
                playThinking();
                
                try {
                    const result = await robotSoul.interact(word);
                    if (outputArea) outputArea.innerHTML = result.spark;
                    if (speechBubble) speechBubble.innerText = `Protocol processed!`;
                    if (sounds.success) sounds.success.play().catch(() => {});
                } catch (e) {
                    if (!robotSoul.isFullBrainReady) {
                        if (outputArea) outputArea.innerHTML = "正在跨越星系连接大脑，请先试试：Robot, Star, Apple, Blue...";
                        if (speechBubble) speechBubble.innerText = "再等我一会儿！";
                    } else {
                        if (outputArea) outputArea.innerHTML = "Etching failure: " + e.message;
                    }
                } finally {
                    stopThinking();
                    connectBtn.disabled = false;
                    connectBtn.innerText = originalText;
                    eyes.forEach(eye => { if (eye) eye.classList.remove('eye-glow'); });
                }
            } catch (fatal) {
                console.error("Interaction crashed:", fatal);
            }
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') connectBtn.click();
        });

        // 4. Mobile "Movement" Interaction: Tilt & Touch Parallax
        const frame = document.getElementById('main-frame');
        const robotCanvas = document.querySelector('.robot-canvas');
        const decoElements = document.querySelectorAll('.deco');

        function applyParallax(x, y) {
            const moveX = (x - window.innerWidth / 2) / 20;
            const moveY = (y - window.innerHeight / 2) / 20;
            
            if (robotCanvas) {
                robotCanvas.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
            
            decoElements.forEach((deco, index) => {
                const depth = (index % 3 + 1) * 10;
                deco.style.transform = `translate(${moveX / depth}px, ${moveY / depth}px)`;
            });
        }

        // Mouse Move for Desktop
        window.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) applyParallax(e.clientX, e.clientY);
        });

        // Touch Move for Mobile
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                applyParallax(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        // Tilt effect for Mobile (Gyroscope)
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                if (e.beta !== null && e.gamma !== null) {
                    const x = (e.gamma + 30) * (window.innerWidth / 60);
                    const y = (e.beta - 30) * (window.innerHeight / 60);
                    applyParallax(x, y);
                }
            }, true);
        }
    </script>
